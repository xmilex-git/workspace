<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=1440">
<title>PR #7228 — NDV 통계 수집 워크스루</title>
<style>
  :root{
    --bg-side:#181818; --bg-editor:#1F1F1F; --bg-tab:#252526; --border:#2B2B2B;
    --fg:#CCCCCC; --muted:#858585;
    --kw:#569CD6; --ctrl:#C586C0; --type:#4EC9B0; --string:#CE9178;
    --num:#B5CEA8; --comment:#6A9955; --func:#DCDCAA; --var:#9CDCFE;
    --add:#6A9955; --del:#F14C4C; --orange:#E0913C;
    --mono:"SF Mono","Menlo","Monaco","Consolas","Liberation Mono",monospace;
    --ui:-apple-system,BlinkMacSystemFont,"Segoe UI","Apple SD Gothic Neo","Malgun Gothic","Noto Sans KR",sans-serif;
  }
  *{box-sizing:border-box;margin:0;padding:0}
  html,body{height:100%; margin:0; overflow:hidden}
  body{background:var(--bg-editor); color:var(--fg); font-family:var(--ui)}
  ::selection{background:rgba(86,156,214,.28)}

  /* ---- deck ----
     Deck fills the VIEWPORT (no fixed 1440 canvas). Content is width-capped at 1328 and centered,
     so it reads like the 1440 design but never gets clipped on the right when the window is smaller
     (browser zoom-in). Each slide keeps its head fixed and scrolls its BODY (VS Code-style) when the
     content can't fit. The atmosphere is ONE continuous layer over the whole viewport and fades with
     rgba(color,0) -- never the `transparent` keyword -- so it never shows a seam or banding. */
  #deck{position:fixed; inset:0; overflow:hidden; background:var(--bg-editor);
    background-image:
      radial-gradient(1300px 900px at 82% -8%, rgba(86,156,214,.07), rgba(86,156,214,0) 62%),
      radial-gradient(1100px 760px at 6% 108%, rgba(197,134,192,.06), rgba(197,134,192,0) 58%);
  }
  .slide{position:absolute; inset:0; padding:40px 56px 0; display:none; flex-direction:column; align-items:center; opacity:0}
  .slide.active{display:flex; animation:fade .42s ease both}
  @keyframes fade{from{opacity:0;transform:translateY(8px)} to{opacity:1;transform:none}}

  /* ---- slide head (fixed; never scrolls) ---- */
  .head{position:relative; flex:0 0 auto; width:100%; max-width:1328px; margin:0 auto 20px; padding-bottom:18px; border-bottom:1px solid var(--border)}
  .eyebrow{font-family:var(--mono); font-size:12px; letter-spacing:.16em; text-transform:uppercase; color:var(--kw); display:flex; align-items:center; gap:10px}
  .eyebrow .pin{color:var(--muted)}
  .title{font-size:30px; font-weight:600; letter-spacing:-.01em; margin-top:12px; line-height:1.18; color:#EDEDED}
  .title em{font-style:normal; color:var(--kw)}
  .title code{font-family:var(--mono); font-size:.86em; font-weight:600; color:#E6E6E6}
  .subtitle{margin-top:9px; font-size:14.5px; color:var(--muted); line-height:1.5; max-width:1100px}
  .meta{position:absolute; top:2px; right:0; text-align:right; font-family:var(--mono); font-size:11.5px; color:var(--muted); line-height:1.7}
  .meta .fp{color:#9aa0a6}
  .meta .ln{color:var(--num)}
  .headpills{display:flex; gap:7px; margin-top:14px; flex-wrap:wrap}

  /* ---- body / split ---- */
  /* body fills the remaining slide height (does NOT scroll itself); the panels inside scroll. */
  .body{flex:1 1 auto; min-height:0; width:100%; max-width:1328px; margin:0 auto; padding-bottom:60px; display:flex; flex-direction:column; overflow:hidden}
  .stepwrap{flex:1 1 auto; min-height:0}
  /* split row stretches to the full body height so each column can cap + scroll internally. */
  .split{display:grid; grid-template-columns:1.16fr .84fr; gap:26px; width:100%; height:100%; grid-template-rows:minmax(0,1fr); align-items:stretch; min-height:0}
  .single{display:block; width:100%; height:100%; overflow:auto; padding-right:6px}
  .col-left{min-width:0; min-height:0; display:flex; flex-direction:column}
  /* right notes column: scroll internally (VS Code-style) when taller than the body. */
  .col-right{min-width:0; min-height:0; overflow:auto; padding-right:6px}

  /* ---- code panel (VS Code editor tab) ---- */
  .codepanel{border:1px solid var(--border); border-top:0; border-radius:7px; background:var(--bg-editor); overflow:hidden; display:flex; flex-direction:column; flex:1 1 auto; min-height:0; box-shadow:0 18px 40px -28px rgba(0,0,0,.8)}
  .codepanel .stripe{height:2px; background:linear-gradient(90deg,var(--orange),rgba(224,145,60,.25))}
  .tabbar{display:flex; align-items:center; gap:9px; background:var(--bg-tab); padding:8px 13px; border-bottom:1px solid var(--border); font-size:12px}
  .tabbar .dot{width:9px;height:9px;border-radius:50%;background:#3a3d41;flex:0 0 auto}
  .tabbar .fname{font-family:var(--mono); color:#d6d6d6}
  .tabbar .badge{font-family:var(--mono); font-size:10px; padding:1px 6px; border-radius:4px; color:var(--muted); border:1px solid var(--border)}
  .crumb{margin-left:auto; font-family:var(--mono); font-size:11px; color:var(--muted); display:flex; align-items:center; gap:6px}
  .crumb .ln{color:var(--num)}
  /* THE code block scrolls inside itself (both axes) when zoomed/too tall -- never clipped. */
  .code-wrap{overflow:auto; padding:13px 4px 14px 0; flex:1 1 auto; min-height:0}
  .code-wrap pre{white-space:normal; font-family:var(--mono); font-size:13px; line-height:1.62}
  .ln{display:block; white-space:pre; padding:0 16px 0 0; min-height:1.62em}
  .ln .g{display:inline-block; width:2.2ch; text-align:left; color:var(--muted); user-select:none}
  .ln.add{background:rgba(106,153,85,.13); box-shadow:inset 2px 0 0 var(--add)}
  .ln.add .g{color:var(--add)}
  .ln.del{background:rgba(241,76,76,.11); box-shadow:inset 2px 0 0 var(--del)}
  .ln.del .g{color:var(--del)}
  .ln.hunk{color:var(--ctrl); opacity:.85}
  .ln.blank{min-height:1.62em}

  /* syntax tokens */
  .cm{color:var(--comment);font-style:italic} .st{color:var(--string)} .nm{color:var(--num)}
  .kw{color:var(--kw)} .ct{color:var(--ctrl)} .ty{color:var(--type)} .fn{color:var(--func)} .va{color:var(--fg)}

  /* code caption under a panel */
  .capt{font-size:11.5px; color:var(--muted); margin-top:9px; font-family:var(--mono); line-height:1.5}
  .capt b{color:#b9b9b9;font-weight:600}

  /* ---- right column blocks ---- */
  .col-right h3{font-size:13px; text-transform:uppercase; letter-spacing:.1em; color:#bdbdbd; margin:0 0 11px; font-weight:600; display:flex; align-items:center; gap:8px}
  .col-right h3::before{content:""; width:7px; height:7px; background:var(--kw); border-radius:2px; transform:rotate(45deg)}
  .col-right h3.alt::before{background:var(--ctrl)}
  ul.notes{list-style:none; display:flex; flex-direction:column; gap:11px; margin-bottom:18px}
  ul.notes>li{position:relative; padding-left:18px; font-size:14px; line-height:1.62; color:#c7c7c7}
  ul.notes>li::before{content:"▸"; position:absolute; left:0; top:0; color:var(--kw); font-size:12px}
  ul.notes>li b{color:#e9e9e9; font-weight:600}
  .sub{margin:6px 0 0 2px; padding-left:14px; border-left:1px solid var(--border); display:flex; flex-direction:column; gap:5px}
  .sub li{font-size:13px; color:var(--muted); line-height:1.55; list-style:none; position:relative; padding-left:13px}
  .sub li::before{content:"–"; position:absolute; left:0; color:var(--muted)}

  /* inline code pill */
  .inl,code.inl{font-family:var(--mono); font-size:.875em; background:rgba(86,156,214,.13); color:var(--var); padding:1px 6px; border-radius:5px; border:1px solid rgba(86,156,214,.16)}

  /* pills / labels */
  .pill{display:inline-flex; align-items:center; gap:5px; font-family:var(--mono); font-size:10.5px; letter-spacing:.06em; text-transform:uppercase; padding:3px 9px; border-radius:20px; border:1px solid; line-height:1; white-space:nowrap}
  .pill.client{color:#9CDCFE;border-color:rgba(156,220,254,.4);background:rgba(86,156,214,.1)}
  .pill.server{color:#C586C0;border-color:rgba(197,134,192,.4);background:rgba(197,134,192,.1)}
  .pill.diff{color:var(--orange);border-color:rgba(224,145,60,.45);background:rgba(224,145,60,.1)}
  .pill.new{color:#9bd17f;border-color:rgba(106,153,85,.5);background:rgba(106,153,85,.13)}
  .pill.ctx{color:var(--muted);border-color:var(--border);background:rgba(255,255,255,.02)}
  .pill.q{color:#E6B450;border-color:rgba(230,180,80,.45);background:rgba(230,180,80,.1)}
  .pill.nit{color:#bdbdbd;border-color:var(--border);background:rgba(255,255,255,.03)}
  .pill.dot::before{content:"";width:6px;height:6px;border-radius:50%;background:currentColor;display:inline-block}

  /* callout */
  .callout{border:1px solid var(--border); border-left:3px solid var(--kw); background:rgba(86,156,214,.06); border-radius:6px; padding:12px 14px; font-size:13.5px; line-height:1.6; color:#cfcfcf; margin-bottom:16px}
  .callout.warn{border-left-color:var(--del); background:rgba(241,76,76,.06)}
  .callout.q{border-left-color:#E6B450; background:rgba(230,180,80,.06)}
  .callout.ok{border-left-color:var(--add); background:rgba(106,153,85,.07)}
  .callout .lbl{display:block; font-family:var(--mono); font-size:11px; letter-spacing:.08em; text-transform:uppercase; color:var(--muted); margin-bottom:6px}
  .callout b{color:#ededed}

  /* tables (VS Code style) */
  table.vt{width:100%; border-collapse:collapse; font-size:13px; margin-bottom:16px}
  table.vt th{font-family:var(--mono); font-size:11px; text-transform:uppercase; letter-spacing:.05em; color:var(--muted); text-align:left; padding:7px 11px; border-bottom:1px solid var(--border); background:var(--bg-tab); font-weight:600}
  table.vt td{padding:7px 11px; border-bottom:1px solid var(--border); color:#c9c9c9; vertical-align:top}
  table.vt tr:hover td{background:rgba(255,255,255,.025)}
  table.vt td.mono,table.vt td .mono{font-family:var(--mono); color:var(--num)}
  table.vt td b{color:#ededed}

  /* step indicator */
  .steptag{position:absolute; bottom:54px; right:64px; display:flex; align-items:center; gap:7px; z-index:40}
  .steptag .d{width:7px;height:7px;border-radius:50%;background:#3a3d41;transition:.2s}
  .steptag .d.on{background:var(--kw);box-shadow:0 0 0 3px rgba(86,156,214,.16)}
  .steptag .lab{font-family:var(--mono);font-size:11px;color:var(--muted);margin-right:3px}

  /* ---- footer ---- */
  /* footer + progress bar are pinned to the viewport and span its full width, so they stay
     fully visible at ANY zoom level (never scroll away, never clipped at the right edge). */
  #footer{position:fixed; left:0; right:0; bottom:0; height:46px; display:flex; align-items:center; gap:16px; padding:0 26px; background:var(--bg-side); border-top:1px solid var(--border); font-size:12px; z-index:50; box-shadow:0 -10px 22px -10px rgba(0,0,0,.6)}
  #footer .brand{font-family:var(--mono); color:var(--muted); display:flex; align-items:center; gap:8px}
  #footer .brand .sq{width:13px;height:13px;border-radius:3px;background:linear-gradient(135deg,var(--kw),var(--ctrl))}
  #footer .ftitle{color:#bdbdbd; flex:0 1 auto; min-width:0; max-width:680px; overflow:hidden; text-overflow:ellipsis; white-space:nowrap}
  #footer .spacer{flex:1}
  #footer .keys{display:flex; gap:6px; color:var(--muted); font-family:var(--mono); font-size:11px}
  #footer kbd{font-family:var(--mono); font-size:10.5px; background:var(--bg-tab); border:1px solid var(--border); border-bottom-width:2px; border-radius:4px; padding:1px 6px; color:#bdbdbd}
  #footer .count{font-family:var(--mono); color:#bdbdbd}
  #footer .count b{color:var(--kw)}
  #pbar{position:fixed; left:0; right:0; bottom:46px; height:2px; background:transparent; z-index:51}
  #pbar i{display:block; height:100%; background:linear-gradient(90deg,var(--kw),var(--ctrl)); width:0; transition:width .4s ease}

  /* ---- cover ---- */
  .cover{padding:0; overflow:auto}
  .cover .wrap{flex:1; width:100%; min-height:0; display:grid; grid-template-columns:1.25fr .95fr; gap:0}
  .cover .left{padding:96px 60px 60px 64px; display:flex; flex-direction:column; justify-content:center}
  .cover .right{background:var(--bg-side); border-left:1px solid var(--border); padding:64px 46px; display:flex; flex-direction:column; justify-content:center; gap:14px}
  .cover .logo{display:flex; align-items:center; gap:12px; margin-bottom:30px}
  .cover .logo .mk{width:34px;height:34px;border-radius:8px;background:linear-gradient(135deg,var(--kw),var(--ctrl));display:flex;align-items:center;justify-content:center;font-family:var(--mono);font-weight:700;color:#fff;font-size:15px}
  .cover .logo .nm{font-family:var(--mono);letter-spacing:.04em;color:#d6d6d6;font-size:14px}
  .cover .logo .br{color:var(--muted);font-size:12px;font-family:var(--mono)}
  .cover .ttl{font-size:52px; font-weight:700; letter-spacing:-.022em; line-height:1.08; color:#f2f2f2}
  .cover .ttl em{font-style:normal; background:linear-gradient(90deg,#7cc0f0,#c586c0); -webkit-background-clip:text; background-clip:text; color:transparent}
  .cover .ttl .mono{font-family:var(--mono); font-size:.5em; font-weight:600; color:var(--type); display:block; margin-top:14px; letter-spacing:0}
  .cover .lede{margin-top:24px; font-size:16px; line-height:1.6; color:var(--muted); max-width:560px}
  .cover .chips{display:flex; gap:9px; margin-top:34px; flex-wrap:wrap}
  .cover .chips .pill{font-size:11px;padding:5px 11px}
  .cover .rh{font-family:var(--mono); font-size:11px; letter-spacing:.12em; text-transform:uppercase; color:var(--muted); margin-bottom:8px}
  .cover .kv{display:flex; flex-direction:column; gap:11px}
  .cover .kv .row{display:flex; justify-content:space-between; align-items:baseline; gap:14px; padding-bottom:11px; border-bottom:1px solid var(--border)}
  .cover .kv .k{font-size:13px; color:var(--muted)}
  .cover .kv .v{font-family:var(--mono); font-size:13px; color:#dcdcdc; text-align:right}
  .cover .kv .v.acc{color:var(--type)}
  .cover .kv .v.blue{color:var(--var)}
  .cover .start{margin-top:18px; font-family:var(--mono); font-size:12px; color:var(--muted); display:flex; flex-direction:column; gap:9px}
  .cover .start a{color:var(--kw); text-decoration:none; cursor:pointer; display:flex; align-items:center; gap:9px}
  .cover .start a:hover{color:#9CDCFE}
  .cover .start a .ic{color:var(--muted)}

  /* ---- TOC ---- */
  .toc .grid{display:grid; grid-template-columns:1fr 1fr; gap:8px 24px; align-content:start; padding-right:6px}
  .toc .item{display:grid; grid-template-columns:auto 1fr; gap:12px; padding:10px 14px; border:1px solid var(--border); border-radius:8px; background:var(--bg-editor); cursor:pointer; transition:.16s; align-items:start}
  .toc .item:hover{border-color:rgba(86,156,214,.5); background:rgba(86,156,214,.05); transform:translateX(3px)}
  .toc .item .no{font-family:var(--mono); font-size:13px; color:var(--kw); font-weight:600; padding-top:1px}
  .toc .item .tt{font-size:13.5px; color:#e4e4e4; font-weight:600; line-height:1.28}
  .toc .item .tt code{font-family:var(--mono);font-size:.85em;color:#cfcfcf;font-weight:600}
  .toc .item .ds{font-size:12px; color:var(--muted); margin-top:3px; line-height:1.4; display:-webkit-box; -webkit-line-clamp:2; -webkit-box-orient:vertical; overflow:hidden}
  .toc .item .cat{font-family:var(--mono);font-size:9.5px;letter-spacing:.08em;text-transform:uppercase;color:var(--ctrl);margin-top:5px}

  /* ---- flow diagram (마무리) ---- */
  .flow{display:flex; flex-wrap:wrap; gap:8px 4px; align-items:center; margin:6px 0 22px; padding:18px; border:1px solid var(--border); border-radius:9px; background:var(--bg-side)}
  .fnode{display:inline-flex; align-items:center; gap:7px; font-family:var(--mono); font-size:12px; padding:7px 11px; border-radius:6px; border:1px solid var(--border); background:var(--bg-editor); color:#d2d2d2}
  .fnode .tag{font-size:9px; font-weight:700; padding:1px 4px; border-radius:3px}
  .fnode.c{border-color:rgba(156,220,254,.32)} .fnode.c .tag{background:rgba(86,156,214,.2); color:#9CDCFE}
  .fnode.s{border-color:rgba(197,134,192,.32)} .fnode.s .tag{background:rgba(197,134,192,.2); color:#C586C0}
  .farr{color:var(--muted); font-size:13px; padding:0 1px}
  .findgrid{display:grid; grid-template-columns:1fr 1fr 1fr; gap:12px}
  .fcard{border:1px solid var(--border); border-radius:8px; padding:13px 14px; background:var(--bg-editor)}
  .fcard .top{display:flex; align-items:center; gap:8px; margin-bottom:8px}
  .fcard .desc{font-size:13px; color:#c9c9c9; line-height:1.5}
  .fcard .loc{font-family:var(--mono); font-size:11px; color:var(--muted); margin-top:8px}
  .fcard .loc b{color:var(--type)}

  /* ---- closing ---- */
  .closing{align-items:center; justify-content:center; text-align:center; overflow:auto; padding-bottom:60px}
  .closing .big{font-size:58px; font-weight:700; letter-spacing:-.02em; color:#f2f2f2}
  .closing .big em{font-style:normal; background:linear-gradient(90deg,#7cc0f0,#c586c0); -webkit-background-clip:text; background-clip:text; color:transparent}
  .closing .qa{margin-top:14px; font-family:var(--mono); font-size:15px; color:var(--muted); letter-spacing:.1em}
  .closing .oneline{margin-top:40px; max-width:760px; font-size:16px; line-height:1.7; color:#cfcfcf; border:1px solid var(--border); border-radius:10px; padding:22px 26px; background:var(--bg-side)}
  .closing .oneline b{color:#ededed}
  .closing .recap{display:flex; gap:9px; margin-top:26px; flex-wrap:wrap; justify-content:center; max-width:820px}
  .closing .foot{margin-top:40px; font-family:var(--mono); font-size:12px; color:#5a5a5a}

  /* scrollbars */
  ::-webkit-scrollbar{width:11px;height:11px}
  ::-webkit-scrollbar-thumb{background:#37373d;border-radius:6px;border:3px solid transparent;background-clip:padding-box}
  ::-webkit-scrollbar-thumb:hover{background:#4a4a52;background-clip:padding-box}
  ::-webkit-scrollbar-track{background:transparent}
</style>
</head>
<body>
<div id="deck"></div>
<div id="pbar"><i></i></div>
<div id="footer">
  <span class="brand"><span class="sq"></span> CUBRID · CODE REVIEW</span>
  <span class="ftitle" id="ftitle"></span>
  <span class="spacer"></span>
  <span class="keys"><kbd>→</kbd><kbd>Space</kbd> 다음 · <kbd>←</kbd> 이전 · <kbd>#</kbd> 목차</span>
  <span class="count" id="count"></span>
</div>

<script>
/* ============================================================= *
 *  VS Code-flavored C/C++ syntax highlighter (tokenizer)
 * ============================================================= */
const CTRL = new Set(["if","else","for","while","return","goto","continue","break","switch","case","do","default"]);
const KW = new Set(["int","bool","void","char","double","float","unsigned","signed","long","short",
  "const","static","struct","enum","union","typedef","sizeof","auto","inline","extern","volatile",
  "register","namespace","class","template","true","false","NULL","new","delete","operator","using","thread_local","this"]);

function esc(s){ return s.replace(/&/g,"&amp;").replace(/</g,"&lt;").replace(/>/g,"&gt;"); }
function span(cls,txt){ return '<span class="'+cls+'">'+esc(txt)+'</span>'; }

function hlLine(code){
  let out=""; let i=0; const n=code.length;
  while(i<n){
    const c=code[i];
    // line comment
    if(c==="/"&&code[i+1]==="/"){ out+=span("cm",code.slice(i)); break; }
    // block comment (single line within this token stream)
    if(c==="/"&&code[i+1]==="*"){ let j=code.indexOf("*/",i+2); j=(j<0)?n:j+2; out+=span("cm",code.slice(i,j)); i=j; continue; }
    // string / char
    if(c==='"'||c==="'"){ let j=i+1; while(j<n&&code[j]!==c){ if(code[j]==="\\")j++; j++; } j=Math.min(j+1,n); out+=span("st",code.slice(i,j)); i=j; continue; }
    // number
    if(/[0-9]/.test(c) && (i===0 || !/[A-Za-z_0-9]/.test(code[i-1]))){
      const m=/^[0-9][0-9a-fA-FxX._]*[uUlLfF]*/.exec(code.slice(i));
      out+=span("nm",m[0]); i+=m[0].length; continue;
    }
    // identifier
    if(/[A-Za-z_]/.test(c)){
      const m=/^[A-Za-z_]\w*/.exec(code.slice(i)); const w=m[0];
      let k=i+w.length; while(k<n && code[k]===" ") k++;
      const isCall = code[k]==="(";
      let cls;
      if(CTRL.has(w)) cls="ct";
      else if(KW.has(w)) cls="kw";
      else if(/^[A-Z][A-Z0-9_]{1,}$/.test(w)) cls="ty";   // UPPER_SNAKE -> type/const
      else if(isCall) cls="fn";
      else cls="va";
      out+=span(cls,w); i+=w.length; continue;
    }
    // raw char
    out+=esc(c); i++;
  }
  return out;
}

function renderCode(text, mode){
  const lines = text.replace(/\n$/,"").split("\n");
  let html="";
  for(const raw of lines){
    if(mode==="diff"){
      const c0 = raw.charAt(0);
      if(c0==="@"){ html+='<span class="ln hunk"><span class="g"> </span>'+esc(raw)+'</span>'; continue; }
      if(c0==="+"){ html+='<span class="ln add"><span class="g">+</span>'+hlLine(raw.slice(1))+'</span>'; continue; }

`static int
qexec_prepare_table_sampling (THREAD_ENTRY *thread_p, ACCESS_SPEC_TYPE *curr_spec)
{
  sampling_info *sampling = &curr_spec->s_id.s.hsid.sampling;

  if (sampling->prepared) return NO_ERROR;          /* :7409  pick once per execution (no re-pick) */

  /* :7415  partition -> all (pruned) part HFIDs, else root HFID */
  if (curr_spec->parts != NULL) for (part=...) hfids.push_back (part->hfid);
  else                          hfids.push_back (ACCESS_SPEC_HFID (curr_spec));
  n_parts = hfids.size ();

  /* :7431  strided VPID page pick + weight (across all partitions) */
  collect_strided_vpids_multi (thread_p, hfids.data (), n_parts, &picked, &picked_count, &part_offsets, &weight);

  sampling->picked_vpids = picked;          /* :7440  pages to read */
  sampling->part_offsets = part_offsets;    /* :7442  per-partition slice bounds (prefix-sum) */
  sampling->n_parts      = n_parts;
  sampling->weight       = weight;          /* :7448  page expansion weight ~ 1/pick-rate */
  sampling->prepared     = true;            /* :7449 */
}`},

`static std::mt19937 &heap_sampling_rng (void)
{ static thread_local std::mt19937 rng; return rng; }            /* one per thread, shared by all sampling scans */

static void heap_sampling_init_rng (sampling_info *sampling)     /* :7849 */
{ if (sampling != NULL && !sampling->random_seeded)
    { heap_sampling_rng ().seed (123456789u); sampling->random_seeded = true; } }   /* fixed seed, once per scan */

static bool heap_sampling_bernoulli_keep (sampling_info *sampling)   /* :7859 */
{ if (sampling == NULL || sampling->ndv_row_sample_p <= 0.0f) return true;   /* thinning off -> no RNG */
  if (sampling->ndv_row_sample_p >= 1.0f) return true;
  heap_sampling_init_rng (sampling);
  std::uniform_real_distribution<double> dist (0.0, 1.0);
  return dist (heap_sampling_rng ()) < (double) sampling->ndv_row_sample_p; }`},

  sub:"정렬된 리스트의 연속 동일값(run) 개수로 distinct(d)·singleton(f1)을 센다. 신규 함수. [-788 디코드 지점]",

  steps:[

`static int
qdata_count_distinct_runs_from_sorted_list (cubthread::entry *thread_p, QFILE_LIST_ID *list_id_p,
                                            TP_DOMAIN *domain, INT64 *d_out, INT64 *f1_out)
{
  pr_type_p = domain->type;  collation_id = TP_DOMAIN_COLLATION (domain);
  qfile_open_list_scan (list_id_p, &scan_id);
  while (true) {
    scan_code = qfile_scan_list_next (thread_p, &scan_id, &tuple_record, PEEK);
    if (scan_code == S_ERROR && er_has_error ()) { ASSERT_ERROR_AND_SET (error); goto exit; }
    if (scan_code != S_SUCCESS) break;
    if (QFILE_GET_TUPLE_VALUE_FLAG (tuple_p) == V_UNBOUND) continue;       /* skip null (defensive) */
    or_init (&buf, ...);
    pr_clear_value (&dbval);
    error = pr_type_p->data_readval (&buf, &dbval, domain, -1, true, NULL, 0);   /* decode value <- -788 was here */
    if (error != NO_ERROR) goto exit;

    if (run_len == 0)
      { pr_clear_value (&prev_dbval); pr_clone_value (&dbval, &prev_dbval); run_len = 1; }
    else if (pr_type_p->cmpval (&prev_dbval, &dbval, 1, 1, NULL, collation_id) == 0)
      run_len++;                                                           /* same value -> extend run */
    else                                                                   /* value changed -> close run */
      { if (run_len == 1) f1++; d++; run_len = 1; pr_clear_value (&prev_dbval); pr_clone_value (&dbval, &prev_dbval); }
  }
  if (run_len == 1) f1++;   /* close last run */
  if (run_len > 0)  d++;
  *d_out = d;  *f1_out = f1;
exit:
  pr_clear_value (&prev_dbval);  pr_clear_value (&dbval);  qfile_close_scan (thread_p, &scan_id);
  return error;
}`},

  sub:"d / f1 / n / weight 로 NDV 를 추정. 경계는 [d, N_nn] 클램프, all-null/빈 → 1. 신규 파일.",

  steps:[
    { code:{ file:"src/storage/statistics_ndv.c:69", mode:"c", badge:"new", text:
`int stats_ndv_effective_sampling_weight (int sampling_weight, float row_sample_p)
{
  int weight = (sampling_weight > 0) ? sampling_weight : 1;
  if (row_sample_p <= 0.0f || row_sample_p >= 1.0f) return weight;
  int effective = (int) ((double) weight / (double) row_sample_p + 0.5);  /* weight / p, round (p=1/12 -> weight*12) */
  return (effective < 1) ? 1 : effective;
}`},
      right:
`<h3>effective weight</h3>
<ul class="notes">
  <li>thinning 켜졌을 때 Stop 13 이 <span class="inl">sampling_weight</span> 를 <span class="inl">weight/p</span>(p=1/12 → ×12)로 바꿔 넣음 → <span class="inl">total_rows</span> 가 <b>페이지 × 행</b> 2단 축소를 모두 복원.</li>
  <li><span class="inl">effective = round(weight / row_sample_p)</span>.</li>
</ul>
<div class="callout"><span class="lbl">Stop 6 심화 연결</span>
<span class="inl">total_rows = sample_rows × weight</span> 의 weight 가 정수. 여기에 float 실현 비율(<span class="inl">total/picked</span>)을 쓰면 N_nn 정확도가 오른다.</div>`},

    { code:{ file:"src/storage/statistics_ndv.c (stats_estimate_ndv_from_sample)", mode:"c", badge:"new", text:
`INT64 stats_estimate_ndv_from_sample (const STATS_NDV_SAMPLE_INPUT *in)
{
  if (in == NULL || in->sample_rows <= 0) return 1;
  int weight       = (in->sampling_weight > 0) ? in->sampling_weight : 1;   /* page (or page x row) expansion */
  double total_rows = (double) in->sample_rows * weight;  if (total_rows < 1) total_rows = 1;
  double null_frac  = clamp (in->sample_nulls / in->sample_rows, 0, 1);
  double n_nn_total = total_rows * (1 - null_frac);                         /* N_nn: est. non-null table rows */
  double n  = in->sample_rows - in->sample_nulls;                           /* sample non-null rows */
  double d  = in->sample_distinct;                                          /* sample distinct */
  double f1 = in->sample_singleton;                                         /* sample singletons */
  if (n <= 0 || d <= 0 || n_nn_total <= 0) return 1;                        /* [Q4] all-null / empty -> 1 */
  if (d > n) d = n;  f1 = clamp (f1, 0, d);                                 /* sanitize input */

  if (weight <= 1 && d >= n_nn_total - 0.5) return round (n_nn_total);      /* full scan / saturated */
  double nmultiple = d - f1;
  if (nmultiple <= 0.0) return round (n_nn_total);                          /* no repeats -> unique-like */
  if (f1 <= 0.0)        return min (round (d), round (n_nn_total));         /* no singleton -> fixed domain = d */

  double est = (n * d) / ((n - f1) + (f1 * n / n_nn_total));                /* <- Duj1 estimator */
  est = clamp (est, d, n_nn_total);                                         /* [d, N_nn] */
  return max (round (est), 1);
}`},
      right:
`<h3 class="alt">추정식 정체 = Duj1</h3>
<div class="callout"><span class="lbl">동치 변형</span>
<span class="inl">est = d / (1 − (1 − q)·f1/n)</span>, &nbsp; q = n / N_nn (샘플링 비율).<br>
full scan(q=1)이면 분모=1 → <b>est = d</b>(정확). q→0 이면 <span class="inl">d/(1 − f1/n)</span> 로 외삽 — singleton 비율이 미관측 distinct 보정.</div>
<h3>분기 / 클램프</h3>
<table class="vt">
 <tr><th>조건</th><th>결과</th></tr>
 <tr><td><span class="inl">n≤0 / d≤0</span> (all-null/빈)</td><td><b>1</b> <span class="pill q">Q4</span></td></tr>
 <tr><td><span class="inl">weight≤1 &amp;&amp; d≥N_nn</span></td><td>N_nn (포화)</td></tr>
 <tr><td><span class="inl">d−f1≤0</span> (반복 전무)</td><td>N_nn (분모 폭발 방지)</td></tr>
 <tr><td><span class="inl">f1≤0</span> (모두 2회+)</td><td>d (고정 도메인)</td></tr>
 <tr><td>그 외</td><td>Duj1, <span class="inl">[d, N_nn]</span> 클램프</td></tr>
</table>`}
  ]},

function tocHTML(){

function slideHTML(s){
  const steps = s.steps;
  let stepsHTML="";
  steps.forEach((st,idx)=>{
    const left = st.code ? `<div class="col-left">${codePanel(st)}</div>` : "";
    const right = `<div class="col-right">${st.right}</div>`;
    const body = st.code
      ? `<div class="split">${left}${right}</div>`
      : `<div class="single">${st.right}</div>`;
    stepsHTML += `<div class="stepwrap" data-step="${idx}" style="display:${idx===0?'block':'none'}">${body}</div>`;
  });
  const dots = steps.length>1
    ? `<div class="steptag"><span class="lab">STEP</span>${steps.map((_,i)=>`<span class="d${i===0?' on':''}"></span>`).join("")}</div>`
    : "";
  const fileparts = s.file.split(":");
  const meta = `<div class="meta"><div class="fp">${fileparts[0]}</div>${fileparts[1]?`<div class="ln">: ${fileparts[1]}</div>`:""}</div>`;
  return `<section class="slide content" data-id="${s.id}" data-steps="${steps.length}">
    <div class="head">
      ${meta}
      <div class="eyebrow"><span class="pin">§</span> ${s.num} · ${s.cat}</div>
      <div class="title">${s.title}</div>
      <div class="subtitle">${s.sub}</div>
      <div class="headpills">${s.pills}</div>
    </div>
    <div class="body" style="position:relative">${stepsHTML}</div>
    ${dots}
  </section>`;
}

/* ============================================================= *
 *  Navigation
 * ============================================================= */
const slides = Array.from(document.querySelectorAll(".slide"));
const idIndex = {}; slides.forEach((s,i)=>{ idIndex[s.dataset.id]=i; });
let cur = 0, step = 0;

function stepsOf(i){ const n=slides[i].dataset.steps; return n?parseInt(n,10):1; }

function render(){
  slides.forEach((s,i)=> s.classList.toggle("active", i===cur));
  const sl = slides[cur];
  // steps
  const wraps = sl.querySelectorAll(".stepwrap");
  wraps.forEach((w,i)=> w.style.display = (i===step)?"block":"none");
  const dots = sl.querySelectorAll(".steptag .d");
  dots.forEach((d,i)=> d.classList.toggle("on", i<=step));
  // reset every internal scroll container (code panel + notes + single) to top-left
  const active = wraps[step] || sl;
  active.querySelectorAll(".code-wrap, .col-right, .single").forEach(el=>{ el.scrollTop=0; el.scrollLeft=0; });
  // footer
  const ftitle = document.getElementById("ftitle");
  const id = sl.dataset.id;
  let label = "Cover";
  if(id==="toc") label="목차";
  else if(id==="closing") label="Q & A";
  else { const d = DECK.find(x=>x.id===id); if(d) label = "§ "+d.num+" · "+d.title.replace(/<\/?em>/g,"").replace(/<\/?code>/g,""); }
  ftitle.textContent = label;
  document.getElementById("count").innerHTML = "<b>"+(cur+1)+"</b> / "+slides.length;
  document.querySelector("#pbar i").style.width = ((cur)/(slides.length-1)*100)+"%";
}

function next(){
  if(step < stepsOf(cur)-1){ step++; render(); return; }
  if(cur < slides.length-1){ cur++; step=0; render(); }
}
function prev(){
  if(step > 0){ step--; render(); return; }
  if(cur > 0){ cur--; step = stepsOf(cur)-1; render(); }
}
function goTo(id){ if(idIndex[id]!=null){ cur=idIndex[id]; step=0; render(); } }

document.addEventListener("keydown", e=>{
  if(e.key==="ArrowRight"||e.key===" "||e.key==="PageDown"){ e.preventDefault(); next(); }
  else if(e.key==="ArrowLeft"||e.key==="PageUp"){ e.preventDefault(); prev(); }
  else if(e.key==="#"||e.key==="t"||e.key==="T"){ e.preventDefault(); goTo("toc"); }
  else if(e.key==="Home"){ e.preventDefault(); cur=0; step=0; render(); }
  else if(e.key==="End"){ e.preventDefault(); cur=slides.length-1; step=0; render(); }
});

document.addEventListener("click", e=>{
  const jump = e.target.closest("[data-jump]");
  if(jump){ e.stopPropagation(); goTo(jump.dataset.jump); return; }
  // ignore clicks that are text selections / inside scrollable code
  if(window.getSelection && String(window.getSelection()).length>0) return;
  if(e.target.closest(".code-wrap, .col-right, table, a")) return;
  next();
});

render();
</script>
